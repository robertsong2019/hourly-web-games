<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞机大战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
        }
        #gameContainer {
            position: relative;
        }
        #gameCanvas {
            border: 3px solid #4a90d9;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(74, 144, 217, 0.5);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }
        #score {
            margin-bottom: 5px;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            display: none;
            z-index: 20;
        }
        #gameOver h1 {
            font-size: 48px;
            color: #ff4757;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
            margin-bottom: 20px;
        }
        #gameOver p {
            font-size: 24px;
            margin-bottom: 30px;
        }
        #restartBtn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(45deg, #4a90d9, #357abd);
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(74, 144, 217, 0.4);
        }
        #restartBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(74, 144, 217, 0.6);
        }
        #instructions {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            font-size: 14px;
            text-align: center;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="480" height="640"></canvas>
        <div id="ui">
            <div id="score">得分: 0</div>
            <div id="lives">生命: 3</div>
        </div>
        <div id="gameOver">
            <h1>游戏结束</h1>
            <p>最终得分: <span id="finalScore">0</span></p>
            <button id="restartBtn">重新开始</button>
        </div>
        <div id="instructions">方向键/WASD 移动 | 空格键 发射子弹</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const livesDisplay = document.getElementById('lives');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');

        // 游戏状态
        let gameRunning = true;
        let score = 0;
        let lives = 3;

        // 玩家飞机
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 80,
            width: 50,
            height: 50,
            speed: 6,
            color: '#00d4ff'
        };

        // 子弹数组
        let bullets = [];
        const bulletSpeed = 10;
        let canShoot = true;
        let shootCooldown = 150;

        // 敌机数组
        let enemies = [];
        let enemySpawnRate = 60;
        let enemySpawnCounter = 0;

        // 爆炸效果
        let explosions = [];

        // 星星背景
        let stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 2 + 0.5
            });
        }

        // 按键状态
        const keys = {
            left: false,
            right: false,
            up: false,
            down: false,
            space: false
        };

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = true;
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = true;
            if (e.key === ' ') {
                keys.space = true;
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = false;
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = false;
            if (e.key === ' ') keys.space = false;
        });

        // 重新开始按钮
        restartBtn.addEventListener('click', restartGame);

        // 绘制玩家飞机
        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x + player.width / 2, player.y + player.height / 2);

            // 飞机主体
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(0, -25);
            ctx.lineTo(-20, 25);
            ctx.lineTo(0, 15);
            ctx.lineTo(20, 25);
            ctx.closePath();
            ctx.fill();

            // 飞机装饰
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(0, 0, 5, 0, Math.PI * 2);
            ctx.fill();

            // 发动机火焰
            ctx.fillStyle = '#ff6b35';
            ctx.beginPath();
            ctx.moveTo(-8, 20);
            ctx.lineTo(0, 35 + Math.random() * 10);
            ctx.lineTo(8, 20);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        // 绘制敌机
        function drawEnemy(enemy) {
            ctx.save();
            ctx.translate(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2);

            // 敌机主体
            ctx.fillStyle = enemy.color;
            ctx.beginPath();
            ctx.moveTo(0, 20);
            ctx.lineTo(-18, -20);
            ctx.lineTo(0, -10);
            ctx.lineTo(18, -20);
            ctx.closePath();
            ctx.fill();

            // 敌机装饰
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(0, 0, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // 绘制子弹
        function drawBullet(bullet) {
            ctx.fillStyle = '#ffff00';
            ctx.shadowColor = '#ffff00';
            ctx.shadowBlur = 10;
            ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
            ctx.shadowBlur = 0;
        }

        // 绘制爆炸效果
        function drawExplosion(exp) {
            ctx.save();
            ctx.globalAlpha = exp.alpha;
            ctx.fillStyle = `hsl(${exp.hue}, 100%, 50%)`;
            ctx.beginPath();
            ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // 绘制星星背景
        function drawStars() {
            ctx.fillStyle = '#fff';
            stars.forEach(star => {
                ctx.globalAlpha = 0.5 + Math.random() * 0.5;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        // 更新星星
        function updateStars() {
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }

        // 生成敌机
        function spawnEnemy() {
            const types = [
                { width: 40, height: 40, speed: 2, color: '#ff4757', points: 10 },
                { width: 50, height: 50, speed: 3, color: '#ff6348', points: 20 },
                { width: 35, height: 35, speed: 4, color: '#ff3838', points: 30 }
            ];
            const type = types[Math.floor(Math.random() * types.length)];
            enemies.push({
                x: Math.random() * (canvas.width - type.width),
                y: -type.height,
                ...type
            });
        }

        // 发射子弹
        function shoot() {
            if (canShoot && gameRunning) {
                bullets.push({
                    x: player.x + player.width / 2 - 2,
                    y: player.y,
                    width: 4,
                    height: 15
                });
                canShoot = false;
                setTimeout(() => canShoot = true, shootCooldown);
            }
        }

        // 创建爆炸效果
        function createExplosion(x, y) {
            for (let i = 0; i < 8; i++) {
                explosions.push({
                    x: x,
                    y: y,
                    radius: 5,
                    alpha: 1,
                    hue: Math.random() * 60 + 10,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6
                });
            }
        }

        // 碰撞检测
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // 更新游戏
        function update() {
            if (!gameRunning) return;

            // 更新玩家位置
            if (keys.left && player.x > 0) player.x -= player.speed;
            if (keys.right && player.x < canvas.width - player.width) player.x += player.speed;
            if (keys.up && player.y > 0) player.y -= player.speed;
            if (keys.down && player.y < canvas.height - player.height) player.y += player.speed;
            if (keys.space) shoot();

            // 更新子弹
            bullets = bullets.filter(bullet => {
                bullet.y -= bulletSpeed;
                return bullet.y > -bullet.height;
            });

            // 生成敌机
            enemySpawnCounter++;
            if (enemySpawnCounter >= enemySpawnRate) {
                spawnEnemy();
                enemySpawnCounter = 0;
                // 逐渐增加难度
                if (enemySpawnRate > 30) enemySpawnRate -= 0.2;
            }

            // 更新敌机
            enemies = enemies.filter(enemy => {
                enemy.y += enemy.speed;

                // 检测与玩家碰撞
                if (checkCollision(player, enemy)) {
                    createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2);
                    lives--;
                    livesDisplay.textContent = `生命: ${lives}`;
                    if (lives <= 0) {
                        endGame();
                    }
                    return false;
                }

                // 敌机飞出屏幕
                if (enemy.y > canvas.height) {
                    return false;
                }

                return true;
            });

            // 子弹与敌机碰撞
            bullets.forEach((bullet, bIndex) => {
                enemies.forEach((enemy, eIndex) => {
                    if (checkCollision(bullet, enemy)) {
                        createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2);
                        score += enemy.points;
                        scoreDisplay.textContent = `得分: ${score}`;
                        bullets.splice(bIndex, 1);
                        enemies.splice(eIndex, 1);
                    }
                });
            });

            // 更新爆炸效果
            explosions = explosions.filter(exp => {
                exp.x += exp.vx;
                exp.y += exp.vy;
                exp.radius += 1.5;
                exp.alpha -= 0.03;
                return exp.alpha > 0;
            });

            // 更新星星
            updateStars();
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制星星
            drawStars();

            // 绘制子弹
            bullets.forEach(drawBullet);

            // 绘制敌机
            enemies.forEach(drawEnemy);

            // 绘制玩家
            drawPlayer();

            // 绘制爆炸效果
            explosions.forEach(drawExplosion);
        }

        // 游戏结束
        function endGame() {
            gameRunning = false;
            finalScoreDisplay.textContent = score;
            gameOverScreen.style.display = 'block';
        }

        // 重新开始游戏
        function restartGame() {
            gameRunning = true;
            score = 0;
            lives = 3;
            bullets = [];
            enemies = [];
            explosions = [];
            enemySpawnRate = 60;
            enemySpawnCounter = 0;
            player.x = canvas.width / 2 - 25;
            player.y = canvas.height - 80;
            scoreDisplay.textContent = `得分: ${score}`;
            livesDisplay.textContent = `生命: ${lives}`;
            gameOverScreen.style.display = 'none';
        }

        // 游戏主循环
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 开始游戏
        gameLoop();
    </script>
</body>
</html>
