<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .game-container {
            background: #bbada0;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            color: #776e65;
        }

        .scores-container {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: #8f7a66;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-align: center;
            min-width: 80px;
        }

        .score-box .label {
            font-size: 12px;
            text-transform: uppercase;
        }

        .score-box .value {
            font-size: 24px;
            font-weight: bold;
        }

        .new-game-btn {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .new-game-btn:hover {
            background: #9f8b77;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: #bbada0;
            padding: 10px;
            border-radius: 5px;
        }

        .cell {
            width: 90px;
            height: 90px;
            background: rgba(238, 228, 218, 0.35);
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
            color: #776e65;
            transition: all 0.15s ease;
        }

        .cell[data-value="2"] { background: #eee4da; }
        .cell[data-value="4"] { background: #ede0c8; }
        .cell[data-value="8"] { background: #f2b179; color: #f9f6f2; }
        .cell[data-value="16"] { background: #f59563; color: #f9f6f2; }
        .cell[data-value="32"] { background: #f67c5f; color: #f9f6f2; }
        .cell[data-value="64"] { background: #f65e3b; color: #f9f6f2; }
        .cell[data-value="128"] { background: #edcf72; color: #f9f6f2; font-size: 35px; }
        .cell[data-value="256"] { background: #edcc61; color: #f9f6f2; font-size: 35px; }
        .cell[data-value="512"] { background: #edc850; color: #f9f6f2; font-size: 35px; }
        .cell[data-value="1024"] { background: #edc53f; color: #f9f6f2; font-size: 30px; }
        .cell[data-value="2048"] { background: #edc22e; color: #f9f6f2; font-size: 30px; }
        .cell[data-value="4096"] { background: #3c3a32; color: #f9f6f2; font-size: 30px; }
        .cell[data-value="8192"] { background: #3c3a32; color: #f9f6f2; font-size: 30px; }

        .cell.new {
            animation: appear 0.2s ease;
        }

        .cell.merged {
            animation: pop 0.2s ease;
        }

        @keyframes appear {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .game-message {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.9);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: 10px;
            z-index: 100;
        }

        .game-message.active {
            display: flex;
        }

        .game-message h2 {
            font-size: 48px;
            color: #776e65;
            margin-bottom: 20px;
        }

        .game-message p {
            font-size: 20px;
            color: #776e65;
            margin-bottom: 30px;
        }

        .instructions {
            text-align: center;
            margin-top: 15px;
            color: #776e65;
            font-size: 14px;
        }

        @media (max-width: 500px) {
            .cell {
                width: 65px;
                height: 65px;
                font-size: 28px;
            }
            .cell[data-value="128"],
            .cell[data-value="256"],
            .cell[data-value="512"] {
                font-size: 25px;
            }
            .cell[data-value="1024"],
            .cell[data-value="2048"],
            .cell[data-value="4096"],
            .cell[data-value="8192"] {
                font-size: 20px;
            }
            .title {
                font-size: 36px;
            }
            .header {
                flex-wrap: wrap;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title">2048</div>
            <div class="scores-container">
                <div class="score-box">
                    <div class="label">得分</div>
                    <div class="value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="label">最高分</div>
                    <div class="value" id="best">0</div>
                </div>
            </div>
            <button class="new-game-btn" onclick="newGame()">新游戏</button>
        </div>
        <div class="grid-container" id="grid"></div>
        <div class="instructions">使用方向键 ↑ ↓ ← → 或滑动屏幕移动方块</div>
        <div class="game-message" id="gameMessage">
            <h2 id="messageTitle">游戏结束!</h2>
            <p id="messageText">最终得分: <span id="finalScore">0</span></p>
            <button class="new-game-btn" onclick="newGame()">再玩一次</button>
        </div>
    </div>

    <script>
        let grid = [];
        let score = 0;
        let best = localStorage.getItem('best2048') || 0;
        let gameOver = false;
        let won = false;

        // 初始化游戏
        function init() {
            document.getElementById('best').textContent = best;
            createGrid();
            newGame();
            setupInputHandlers();
        }

        // 创建网格DOM
        function createGrid() {
            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.setAttribute('data-value', '');
                gridElement.appendChild(cell);
            }
        }

        // 开始新游戏
        function newGame() {
            grid = Array(4).fill(null).map(() => Array(4).fill(0));
            score = 0;
            gameOver = false;
            won = false;
            document.getElementById('score').textContent = score;
            document.getElementById('gameMessage').classList.remove('active');

            addRandomTile();
            addRandomTile();
            updateDisplay();
        }

        // 添加随机方块
        function addRandomTile() {
            const emptyCells = [];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (grid[i][j] === 0) {
                        emptyCells.push({ row: i, col: j });
                    }
                }
            }
            if (emptyCells.length > 0) {
                const { row, col } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid[row][col] = Math.random() < 0.9 ? 2 : 4;
                return { row, col };
            }
            return null;
        }

        // 更新显示
        function updateDisplay(newTile = null, mergedCells = []) {
            const cells = document.querySelectorAll('.cell');
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const index = i * 4 + j;
                    const value = grid[i][j];
                    cells[index].textContent = value || '';
                    cells[index].setAttribute('data-value', value);

                    // 移除动画类
                    cells[index].classList.remove('new', 'merged');

                    // 添加新方块动画
                    if (newTile && newTile.row === i && newTile.col === j) {
                        setTimeout(() => cells[index].classList.add('new'), 10);
                    }

                    // 添加合并动画
                    if (mergedCells.some(c => c.row === i && c.col === j)) {
                        setTimeout(() => cells[index].classList.add('merged'), 10);
                    }
                }
            }
            document.getElementById('score').textContent = score;

            // 更新最高分
            if (score > best) {
                best = score;
                localStorage.setItem('best2048', best);
                document.getElementById('best').textContent = best;
            }
        }

        // 移动逻辑
        function move(direction) {
            if (gameOver) return false;

            let moved = false;
            let mergedCells = [];
            const oldGrid = grid.map(row => [...row]);

            if (direction === 'left') {
                for (let i = 0; i < 4; i++) {
                    const result = slideRow(grid[i]);
                    if (result.moved) moved = true;
                    grid[i] = result.row;
                    result.mergedIndices.forEach(j => mergedCells.push({ row: i, col: j }));
                }
            } else if (direction === 'right') {
                for (let i = 0; i < 4; i++) {
                    const result = slideRow(grid[i].slice().reverse());
                    if (result.moved) moved = true;
                    grid[i] = result.row.reverse();
                    result.mergedIndices.forEach(j => mergedCells.push({ row: i, col: 3 - j }));
                }
            } else if (direction === 'up') {
                for (let j = 0; j < 4; j++) {
                    const col = [grid[0][j], grid[1][j], grid[2][j], grid[3][j]];
                    const result = slideRow(col);
                    if (result.moved) moved = true;
                    for (let i = 0; i < 4; i++) {
                        grid[i][j] = result.row[i];
                    }
                    result.mergedIndices.forEach(i => mergedCells.push({ row: i, col: j }));
                }
            } else if (direction === 'down') {
                for (let j = 0; j < 4; j++) {
                    const col = [grid[3][j], grid[2][j], grid[1][j], grid[0][j]];
                    const result = slideRow(col);
                    if (result.moved) moved = true;
                    const newCol = result.row.reverse();
                    for (let i = 0; i < 4; i++) {
                        grid[i][j] = newCol[i];
                    }
                    result.mergedIndices.forEach(i => mergedCells.push({ row: 3 - i, col: j }));
                }
            }

            if (moved) {
                const newTile = addRandomTile();
                updateDisplay(newTile, mergedCells);

                // 检查是否胜利
                if (!won && grid.some(row => row.includes(2048))) {
                    won = true;
                    showMessage('你赢了!', '恭喜达到2048!');
                }

                // 检查游戏是否结束
                if (isGameOver()) {
                    gameOver = true;
                    showMessage('游戏结束!', '最终得分: ' + score);
                }
            }

            return moved;
        }

        // 滑动一行
        function slideRow(row) {
            let newRow = row.filter(val => val !== 0);
            let moved = false;
            let mergedIndices = [];

            for (let i = 0; i < newRow.length - 1; i++) {
                if (newRow[i] === newRow[i + 1]) {
                    newRow[i] *= 2;
                    score += newRow[i];
                    newRow.splice(i + 1, 1);
                    mergedIndices.push(i);
                }
            }

            while (newRow.length < 4) {
                newRow.push(0);
            }

            for (let i = 0; i < 4; i++) {
                if (newRow[i] !== row[i]) {
                    moved = true;
                    break;
                }
            }

            return { row: newRow, moved, mergedIndices };
        }

        // 检查游戏是否结束
        function isGameOver() {
            // 检查是否有空格
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (grid[i][j] === 0) return false;
                }
            }
            // 检查是否有可合并的
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (j < 3 && grid[i][j] === grid[i][j + 1]) return false;
                    if (i < 3 && grid[i][j] === grid[i + 1][j]) return false;
                }
            }
            return true;
        }

        // 显示消息
        function showMessage(title, text) {
            document.getElementById('messageTitle').textContent = title;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameMessage').classList.add('active');
        }

        // 设置输入处理
        function setupInputHandlers() {
            // 键盘控制
            document.addEventListener('keydown', (e) => {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                    e.preventDefault();
                    const directions = {
                        'ArrowUp': 'up',
                        'ArrowDown': 'down',
                        'ArrowLeft': 'left',
                        'ArrowRight': 'right'
                    };
                    move(directions[e.key]);
                }
            });

            // 触摸控制
            let touchStartX, touchStartY;
            const gameContainer = document.querySelector('.game-container');

            gameContainer.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });

            gameContainer.addEventListener('touchend', (e) => {
                if (!touchStartX || !touchStartY) return;

                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;

                const dx = touchEndX - touchStartX;
                const dy = touchEndY - touchStartY;

                const minSwipeDistance = 30;

                if (Math.abs(dx) > Math.abs(dy)) {
                    if (Math.abs(dx) > minSwipeDistance) {
                        move(dx > 0 ? 'right' : 'left');
                    }
                } else {
                    if (Math.abs(dy) > minSwipeDistance) {
                        move(dy > 0 ? 'down' : 'up');
                    }
                }

                touchStartX = null;
                touchStartY = null;
            });
        }

        // 启动游戏
        init();
    </script>
</body>
</html>
