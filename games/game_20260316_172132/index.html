<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: #bbada0;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            color: #776e65;
        }

        .score-container {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: #8f7a66;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-align: center;
            min-width: 80px;
        }

        .score-box .label {
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .score-box .value {
            font-size: 24px;
            font-weight: bold;
        }

        .new-game-btn {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .new-game-btn:hover {
            background: #9f8b77;
        }

        .instructions {
            color: #776e65;
            font-size: 14px;
            margin-bottom: 15px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: #bbada0;
            padding: 10px;
            border-radius: 5px;
        }

        .cell {
            width: 90px;
            height: 90px;
            background: rgba(238, 228, 218, 0.35);
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
            transition: all 0.15s ease-in-out;
        }

        .cell[data-value="2"] {
            background: #eee4da;
            color: #776e65;
        }

        .cell[data-value="4"] {
            background: #ede0c8;
            color: #776e65;
        }

        .cell[data-value="8"] {
            background: #f2b179;
            color: #f9f6f2;
        }

        .cell[data-value="16"] {
            background: #f59563;
            color: #f9f6f2;
        }

        .cell[data-value="32"] {
            background: #f67c5f;
            color: #f9f6f2;
        }

        .cell[data-value="64"] {
            background: #f65e3b;
            color: #f9f6f2;
        }

        .cell[data-value="128"] {
            background: #edcf72;
            color: #f9f6f2;
            font-size: 35px;
        }

        .cell[data-value="256"] {
            background: #edcc61;
            color: #f9f6f2;
            font-size: 35px;
        }

        .cell[data-value="512"] {
            background: #edc850;
            color: #f9f6f2;
            font-size: 35px;
        }

        .cell[data-value="1024"] {
            background: #edc53f;
            color: #f9f6f2;
            font-size: 30px;
        }

        .cell[data-value="2048"] {
            background: #edc22e;
            color: #f9f6f2;
            font-size: 30px;
            box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.5);
        }

        .cell.new {
            animation: appear 0.2s ease-in-out;
        }

        .cell.merged {
            animation: pop 0.2s ease-in-out;
        }

        @keyframes appear {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.73);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 5px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .game-over.active {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over h2 {
            font-size: 40px;
            color: #776e65;
            margin-bottom: 20px;
        }

        .game-over .final-score {
            font-size: 24px;
            color: #776e65;
            margin-bottom: 20px;
        }

        .grid-wrapper {
            position: relative;
        }

        @media (max-width: 450px) {
            .cell {
                width: 70px;
                height: 70px;
                font-size: 30px;
            }

            .cell[data-value="128"],
            .cell[data-value="256"],
            .cell[data-value="512"] {
                font-size: 28px;
            }

            .cell[data-value="1024"],
            .cell[data-value="2048"] {
                font-size: 24px;
            }

            .title {
                font-size: 36px;
            }

            .score-box {
                padding: 8px 15px;
                min-width: 60px;
            }

            .score-box .value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title">2048</div>
            <div class="score-container">
                <div class="score-box">
                    <div class="label">分数</div>
                    <div class="value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="label">最高</div>
                    <div class="value" id="best-score">0</div>
                </div>
            </div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px;">
            <div class="instructions">使用方向键或滑动移动方块</div>
            <button class="new-game-btn" onclick="newGame()">新游戏</button>
        </div>
        <div class="grid-wrapper">
            <div class="grid" id="grid"></div>
            <div class="game-over" id="game-over">
                <h2>游戏结束!</h2>
                <div class="final-score">最终分数: <span id="final-score">0</span></div>
                <button class="new-game-btn" onclick="newGame()">再来一局</button>
            </div>
        </div>
    </div>

    <script>
        let grid = [];
        let score = 0;
        let bestScore = localStorage.getItem('bestScore2048') || 0;
        let gameOver = false;

        // 初始化游戏
        function init() {
            document.getElementById('best-score').textContent = bestScore;
            createGrid();
            newGame();
            setupControls();
        }

        // 创建网格UI
        function createGrid() {
            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${i}`;
                gridElement.appendChild(cell);
            }
        }

        // 开始新游戏
        function newGame() {
            grid = Array(16).fill(0);
            score = 0;
            gameOver = false;
            updateScore(0);
            document.getElementById('game-over').classList.remove('active');
            addRandomTile();
            addRandomTile();
            render();
        }

        // 添加随机方块
        function addRandomTile() {
            const emptyCells = [];
            for (let i = 0; i < 16; i++) {
                if (grid[i] === 0) {
                    emptyCells.push(i);
                }
            }
            if (emptyCells.length > 0) {
                const randomIndex = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid[randomIndex] = Math.random() < 0.9 ? 2 : 4;
                return randomIndex;
            }
            return -1;
        }

        // 渲染网格
        function render(newTileIndex = -1, mergedIndices = []) {
            for (let i = 0; i < 16; i++) {
                const cell = document.getElementById(`cell-${i}`);
                const value = grid[i];
                cell.textContent = value || '';
                cell.setAttribute('data-value', value);
                cell.classList.remove('new', 'merged');
                if (i === newTileIndex) {
                    cell.classList.add('new');
                }
                if (mergedIndices.includes(i)) {
                    cell.classList.add('merged');
                }
            }
        }

        // 更新分数
        function updateScore(points) {
            score += points;
            document.getElementById('score').textContent = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore2048', bestScore);
                document.getElementById('best-score').textContent = bestScore;
            }
        }

        // 移动逻辑
        function move(direction) {
            if (gameOver) return false;

            let moved = false;
            let mergedIndices = [];
            let points = 0;

            const getRowCol = (index, dir) => {
                const row = Math.floor(index / 4);
                const col = index % 4;
                return dir === 'left' || dir === 'right' ? row : col;
            };

            const getPerpendicular = (index, dir) => {
                const row = Math.floor(index / 4);
                const col = index % 4;
                return dir === 'left' || dir === 'right' ? col : row;
            };

            const getIndex = (primary, secondary, dir) => {
                if (dir === 'left' || dir === 'right') {
                    return primary * 4 + secondary;
                } else {
                    return secondary * 4 + primary;
                }
            };

            // 处理每一行/列
            for (let primary = 0; primary < 4; primary++) {
                let line = [];
                for (let secondary = 0; secondary < 4; secondary++) {
                    const index = getIndex(primary, secondary, direction);
                    if (grid[index] !== 0) {
                        line.push(grid[index]);
                    }
                }

                // 根据方向决定合并顺序
                if (direction === 'right' || direction === 'down') {
                    line.reverse();
                }

                // 合并相同数字
                for (let i = 0; i < line.length - 1; i++) {
                    if (line[i] === line[i + 1]) {
                        line[i] *= 2;
                        points += line[i];
                        line.splice(i + 1, 1);
                    }
                }

                // 补齐0
                while (line.length < 4) {
                    line.push(0);
                }

                if (direction === 'right' || direction === 'down') {
                    line.reverse();
                }

                // 写回网格
                for (let secondary = 0; secondary < 4; secondary++) {
                    const index = getIndex(primary, secondary, direction);
                    if (grid[index] !== line[secondary]) {
                        moved = true;
                    }
                    if (grid[index] !== 0 && line[secondary] > grid[index]) {
                        mergedIndices.push(index);
                    }
                    grid[index] = line[secondary];
                }
            }

            if (moved) {
                updateScore(points);
                const newTile = addRandomTile();
                render(newTile, mergedIndices);

                // 检查游戏结束
                if (!canMove()) {
                    gameOver = true;
                    document.getElementById('final-score').textContent = score;
                    setTimeout(() => {
                        document.getElementById('game-over').classList.add('active');
                    }, 300);
                }
            }

            return moved;
        }

        // 检查是否可以移动
        function canMove() {
            // 检查是否有空格
            if (grid.includes(0)) return true;

            // 检查是否有相邻的相同数字
            for (let i = 0; i < 16; i++) {
                const row = Math.floor(i / 4);
                const col = i % 4;

                // 检查右边
                if (col < 3 && grid[i] === grid[i + 1]) return true;
                // 检查下边
                if (row < 3 && grid[i] === grid[i + 4]) return true;
            }

            return false;
        }

        // 设置控制
        function setupControls() {
            // 键盘控制
            document.addEventListener('keydown', (e) => {
                switch (e.key) {
                    case 'ArrowUp':
                        e.preventDefault();
                        move('up');
                        break;
                    case 'ArrowDown':
                        e.preventDefault();
                        move('down');
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        move('left');
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        move('right');
                        break;
                }
            });

            // 触摸控制
            let touchStartX, touchStartY;
            const gameContainer = document.querySelector('.game-container');

            gameContainer.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });

            gameContainer.addEventListener('touchend', (e) => {
                if (!touchStartX || !touchStartY) return;

                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;

                const deltaX = touchEndX - touchStartX;
                const deltaY = touchEndY - touchStartY;

                const minSwipeDistance = 30;

                if (Math.abs(deltaX) > Math.abs(deltaY)) {
                    if (Math.abs(deltaX) > minSwipeDistance) {
                        if (deltaX > 0) {
                            move('right');
                        } else {
                            move('left');
                        }
                    }
                } else {
                    if (Math.abs(deltaY) > minSwipeDistance) {
                        if (deltaY > 0) {
                            move('down');
                        } else {
                            move('up');
                        }
                    }
                }

                touchStartX = null;
                touchStartY = null;
            });
        }

        // 启动游戏
        init();
    </script>
</body>
</html>
