<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #776e65;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .score-container {
            display: flex;
            gap: 15px;
        }

        .score-box {
            background: #bbada0;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
            min-width: 100px;
        }

        .score-box .label {
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .score-box .value {
            font-size: 24px;
            font-weight: bold;
        }

        .btn-restart {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-restart:hover {
            background: #9f8b77;
            transform: translateY(-2px);
        }

        .game-board {
            background: #bbada0;
            border-radius: 10px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 15px;
        }

        .cell {
            background: rgba(238, 228, 218, 0.35);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
            color: #776e65;
            transition: all 0.15s ease;
        }

        .cell[data-value="2"] {
            background: #eee4da;
            color: #776e65;
        }

        .cell[data-value="4"] {
            background: #ede0c8;
            color: #776e65;
        }

        .cell[data-value="8"] {
            background: #f2b179;
            color: white;
        }

        .cell[data-value="16"] {
            background: #f59563;
            color: white;
        }

        .cell[data-value="32"] {
            background: #f67c5f;
            color: white;
        }

        .cell[data-value="64"] {
            background: #f65e3b;
            color: white;
        }

        .cell[data-value="128"] {
            background: #edcf72;
            color: white;
            font-size: 35px;
        }

        .cell[data-value="256"] {
            background: #edcc61;
            color: white;
            font-size: 35px;
        }

        .cell[data-value="512"] {
            background: #edc850;
            color: white;
            font-size: 35px;
        }

        .cell[data-value="1024"] {
            background: #edc53f;
            color: white;
            font-size: 30px;
        }

        .cell[data-value="2048"] {
            background: #edc22e;
            color: white;
            font-size: 30px;
            box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.5);
        }

        .cell.new {
            animation: appear 0.2s ease;
        }

        @keyframes appear {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .cell.merged {
            animation: pop 0.2s ease;
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .game-over.show {
            display: flex;
        }

        .game-over-content {
            background: white;
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
        }

        .game-over-content h2 {
            font-size: 36px;
            color: #776e65;
            margin-bottom: 20px;
        }

        .game-over-content p {
            font-size: 20px;
            color: #8f7a66;
            margin-bottom: 30px;
        }

        .instructions {
            text-align: center;
            margin-top: 20px;
            color: #776e65;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2048</h1>
        <div class="header">
            <div class="score-container">
                <div class="score-box">
                    <div class="label">得分</div>
                    <div class="value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="label">最高分</div>
                    <div class="value" id="best-score">0</div>
                </div>
            </div>
            <button class="btn-restart" onclick="initGame()">重新开始</button>
        </div>
        <div class="game-board" id="game-board"></div>
        <div class="instructions">
            使用方向键 ↑ ↓ ← → 或滑动屏幕移动方块
        </div>
    </div>

    <div class="game-over" id="game-over">
        <div class="game-over-content">
            <h2 id="game-over-title">游戏结束!</h2>
            <p>最终得分: <span id="final-score">0</span></p>
            <button class="btn-restart" onclick="initGame()">再玩一次</button>
        </div>
    </div>

    <script>
        let grid = [];
        let score = 0;
        let bestScore = localStorage.getItem('bestScore2048') || 0;
        const boardSize = 4;

        // 初始化游戏
        function initGame() {
            grid = Array(boardSize).fill(null).map(() => Array(boardSize).fill(0));
            score = 0;
            updateScore();
            document.getElementById('game-over').classList.remove('show');
            addRandomTile();
            addRandomTile();
            renderBoard();
        }

        // 添加随机方块
        function addRandomTile() {
            const emptyCells = [];
            for (let i = 0; i < boardSize; i++) {
                for (let j = 0; j < boardSize; j++) {
                    if (grid[i][j] === 0) {
                        emptyCells.push({ row: i, col: j });
                    }
                }
            }
            if (emptyCells.length > 0) {
                const { row, col } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid[row][col] = Math.random() < 0.9 ? 2 : 4;
                return { row, col };
            }
            return null;
        }

        // 渲染游戏板
        function renderBoard(newTile = null) {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            for (let i = 0; i < boardSize; i++) {
                for (let j = 0; j < boardSize; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const value = grid[i][j];
                    if (value > 0) {
                        cell.textContent = value;
                        cell.dataset.value = value;
                        if (newTile && newTile.row === i && newTile.col === j) {
                            cell.classList.add('new');
                        }
                    }
                    board.appendChild(cell);
                }
            }
        }

        // 更新分数
        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore2048', bestScore);
            }
            document.getElementById('best-score').textContent = bestScore;
        }

        // 移动逻辑
        function slide(row) {
            let arr = row.filter(val => val !== 0);
            let missing = boardSize - arr.length;
            let zeros = Array(missing).fill(0);
            return zeros.concat(arr);
        }

        function combine(row) {
            for (let i = boardSize - 1; i > 0; i--) {
                if (row[i] === row[i - 1] && row[i] !== 0) {
                    row[i] *= 2;
                    score += row[i];
                    row[i - 1] = 0;
                }
            }
            return row;
        }

        function moveRight() {
            let moved = false;
            for (let i = 0; i < boardSize; i++) {
                let row = grid[i].slice();
                row = slide(row);
                row = combine(row);
                row = slide(row);
                if (row.join(',') !== grid[i].join(',')) {
                    moved = true;
                }
                grid[i] = row;
            }
            return moved;
        }

        function moveLeft() {
            let moved = false;
            for (let i = 0; i < boardSize; i++) {
                let row = grid[i].slice().reverse();
                row = slide(row);
                row = combine(row);
                row = slide(row);
                row.reverse();
                if (row.join(',') !== grid[i].join(',')) {
                    moved = true;
                }
                grid[i] = row;
            }
            return moved;
        }

        function moveUp() {
            let moved = false;
            for (let j = 0; j < boardSize; j++) {
                let col = [];
                for (let i = 0; i < boardSize; i++) {
                    col.push(grid[i][j]);
                }
                let originalCol = col.slice();
                col.reverse();
                col = slide(col);
                col = combine(col);
                col = slide(col);
                col.reverse();
                if (col.join(',') !== originalCol.join(',')) {
                    moved = true;
                }
                for (let i = 0; i < boardSize; i++) {
                    grid[i][j] = col[i];
                }
            }
            return moved;
        }

        function moveDown() {
            let moved = false;
            for (let j = 0; j < boardSize; j++) {
                let col = [];
                for (let i = 0; i < boardSize; i++) {
                    col.push(grid[i][j]);
                }
                let originalCol = col.slice();
                col = slide(col);
                col = combine(col);
                col = slide(col);
                if (col.join(',') !== originalCol.join(',')) {
                    moved = true;
                }
                for (let i = 0; i < boardSize; i++) {
                    grid[i][j] = col[i];
                }
            }
            return moved;
        }

        // 检查游戏是否结束
        function checkGameOver() {
            // 检查是否有空格
            for (let i = 0; i < boardSize; i++) {
                for (let j = 0; j < boardSize; j++) {
                    if (grid[i][j] === 0) return false;
                }
            }
            // 检查是否可以合并
            for (let i = 0; i < boardSize; i++) {
                for (let j = 0; j < boardSize; j++) {
                    if (j < boardSize - 1 && grid[i][j] === grid[i][j + 1]) return false;
                    if (i < boardSize - 1 && grid[i][j] === grid[i + 1][j]) return false;
                }
            }
            return true;
        }

        // 检查是否获胜
        function checkWin() {
            for (let i = 0; i < boardSize; i++) {
                for (let j = 0; j < boardSize; j++) {
                    if (grid[i][j] === 2048) return true;
                }
            }
            return false;
        }

        // 显示游戏结束
        function showGameOver(won = false) {
            document.getElementById('game-over-title').textContent = won ? '恭喜你赢了!' : '游戏结束!';
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over').classList.add('show');
        }

        // 处理移动
        function handleMove(direction) {
            let moved = false;
            switch (direction) {
                case 'up': moved = moveUp(); break;
                case 'down': moved = moveDown(); break;
                case 'left': moved = moveLeft(); break;
                case 'right': moved = moveRight(); break;
            }

            if (moved) {
                const newTile = addRandomTile();
                updateScore();
                renderBoard(newTile);

                if (checkWin()) {
                    setTimeout(() => showGameOver(true), 300);
                } else if (checkGameOver()) {
                    setTimeout(() => showGameOver(false), 300);
                }
            }
        }

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                const direction = e.key.replace('Arrow', '').toLowerCase();
                handleMove(direction);
            }
        });

        // 触摸事件
        let touchStartX, touchStartY;
        const board = document.getElementById('game-board');

        board.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        board.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;

            const minSwipeDistance = 30;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > minSwipeDistance) {
                    handleMove(diffX > 0 ? 'right' : 'left');
                }
            } else {
                if (Math.abs(diffY) > minSwipeDistance) {
                    handleMove(diffY > 0 ? 'down' : 'up');
                }
            }

            touchStartX = null;
            touchStartY = null;
        });

        // 初始化
        document.getElementById('best-score').textContent = bestScore;
        initGame();
    </script>
</body>
</html>
